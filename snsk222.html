<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake game by Luka</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #222; color: white; font-family: sans-serif; overflow: hidden; }
        #scoreboard { display: flex; gap: 20px; margin-bottom: 10px; font-size: 20px; font-weight: bold; }
        canvas { border: 2px solid #555; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="scoreboard">
    <div>Score: <span id="score">0</span></div>
    <div>High Score: <span id="bestScore">0</span></div>
</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const bestScoreElement = document.getElementById("bestScore");

    const gridSize = 20;
    canvas.width = 360;
    canvas.height = 360;

    let snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}, {x: 7, y: 10}];
    let food = {x: 10, y: 10};
    let dx = 1;
    let dy = 0;
    let score = 0;
    let topScore = localStorage.getItem("snakeBestScore") || 0;
    bestScoreElement.textContent = topScore;

    // Kontrole prevlačenjem
    let touchStartX = 0;
    let touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    });
    canvas.addEventListener('touchend', e => {
        let diffX = e.changedTouches[0].clientX - touchStartX;
        let diffY = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(diffX) > Math.abs(diffY)) {
            if (diffX > 0 && dx === 0) { dx = 1; dy = 0; }
            else if (diffX < 0 && dx === 0) { dx = -1; dy = 0; }
        } else {
            if (diffY > 0 && dy === 0) { dx = 0; dy = 1; }
            else if (diffY < 0 && dy === 0) { dx = 0; dy = -1; }
        }
    });

    function update() {
        let head = {x: snake[0].x + dx, y: snake[0].y + dy};

        // Reset igre
        if (head.x < 0 || head.x >= canvas.width/gridSize || head.y < 0 || head.y >= canvas.height/gridSize) {
            if (score > topScore) {
                topScore = score;
                localStorage.setItem("snakeBestScore", topScore);
                bestScoreElement.textContent = topScore;
            }
            score = 0;
            scoreElement.textContent = score;
            snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}, {x: 7, y: 10}];
            dx = 1; dy = 0;
            return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreElement.textContent = score;
            food = {x: Math.floor(Math.random()*(canvas.width/gridSize)), y: Math.floor(Math.random()*(canvas.height/gridSize))};
        } else {
            snake.pop();
        }
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc((food.x * gridSize) + gridSize/2, (food.y * gridSize) + gridSize/2, gridSize/2 - 2, 0, Math.PI*2);
        ctx.fill();

        snake.forEach((part, index) => {
            ctx.fillStyle = "#006400";
            ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            if (index === 0) {
                ctx.fillStyle = "white";
                ctx.fillRect(part.x * gridSize + 4, part.y * gridSize + 4, 4, 4);
                ctx.fillRect(part.x * gridSize + 12, part.y * gridSize + 4, 4, 4);
            }
        });
    }

    setInterval(() => {
        update();
        draw();
    }, 180);
</script>
</body>
</html>
